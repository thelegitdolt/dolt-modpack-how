["Biome Fog"]
	#Enable/disable Darker Depths biome fog adjustments:
	biome_fog = true

	["Biome Fog"."Glowshroom Forest"]
		#Min fog distance:
		#Range: -1000 ~ 1000
		min_fog = 0
		#Max fog distance:
		#Range: -1000 ~ 1000
		max_fog = 96

	["Biome Fog"."Molten Cavern"]
		#Min fog distance:
		#Range: -1000 ~ 1000
		min_fog = 0
		#Max fog distance:
		#Range: -1000 ~ 1000
		max_fog = 96

	["Biome Fog"."Sandy Catacombs"]
		#Min fog distance:
		#Range: -1000 ~ 1000
		min_fog = -10
		#Max fog distance:
		#Range: -1000 ~ 1000
		max_fog = 128

[Supercharges]
	#Duration of the supercharge buff in minutes
	#Range: 1 ~ 3600
	supercharge_minutes = 5
	#Supercharge Multipliers - Increases in percentage:
	#Dig speed increase:
	#Range: 0 ~ 1000
	supercharge_dig_speed = 20
	#Attack speed increase:
	#Range: 0 ~ 1000
	supercharge_attack_speed = 20
	#Attack damage increase:
	#Range: 0 ~ 1000
	supercharge_attack_damage = 20
	#Supercharge tool unbreakablity:
	supercharge_unbreakable = true

["Paranoia Altar"]
	#Allows players in creative mode to be effected by the Paranoia Altar
	paranoia_altar_effects_creative = false
	#Range: 0 ~ 128
	paranoia_altar_horizontal_range = 72
	#Range: 0 ~ 128
	paranoia_altar_vertical_range = 8

[Performance]
	#Blocks like Darkslate are 'baked' into generation so that all of their stages are set correctly after world generation. 
	#This budget controls how many resources are provided to bake each tick. 
	#Setting this to a high value will result in more lag when generating, but will finish baking faster. 
	#Recommended to keep this value low (< 2500) as baking is typically not a priority.
	#A value too low will result in worse performance overall as chunks will repeatedly have to be revisited as baking has not completed.
	#Range: > 500
	heat_bake_budget = 2500
	#Disable baking heatable blocks (not recommended!)
	#Blocks such as Darkslate will not generate with the correct stages and will not be updated to be correct heat values upon generation if true.
	#Baking does require additional resources, so disabling should improve world gen performance.
	disable_heatable_block_baking = false

