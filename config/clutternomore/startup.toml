# If shape maps (grouping) should be loaded
# default: true
shape_maps = true
# If vertical slabs should be added to all existing slabs
# default: true
vertical_slabs = true
# If steps should be added to all existing stairs
# default: true
steps = true
# If detailed warnings should be logged for development purposes
# default: false
detailed_logs = false
# If a copy of the runtime datapack should be generated
# default: false
runtime_data_generation = true
